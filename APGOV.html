    // ===== Icon helper (uses lucide vanilla) =====
    function Icon({ name, size = 16, fill = "none", strokeWidth = 2, ...rest }) {
      const data = window.lucide && window.lucide.icons && window.lucide.icons[name];
      if (!data) return null;
      const children = data[2] || [];
      return (
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width={size}
          height={size}
          viewBox="0 0 24 24"
          fill={fill}
          stroke="currentColor"
          strokeWidth={strokeWidth}
          strokeLinecap="round"
          strokeLinejoin="round"
          {...rest}
        >
          {children.map((child, i) => {
            const [tag, attrs] = child;
            const reactAttrs = {};
            for (const k in attrs) {
              const camel = k.replace(/-([a-z])/g, (_, c) => c.toUpperCase());
              reactAttrs[camel] = attrs[k];
            }
            return React.createElement(tag, { key: i, ...reactAttrs });
          })}
        </svg>
      );
    }

    const safeGet = (key, fallback) => {

        return JSON.parse(v);

    };

      try { localStorage.setItem(key, JSON.stringify(value)); } catch {}

    function App() {

      const [studySub, setStudySub] = useState('cases');
      const [drillSub, setDrillSub] = useState('speed');

      const [progress, setProgress] = useState({ cases: {}, docs: {}, terms: {} });
      const [stats, setStats] = useState({
        quizBest: 0, quizAttempts: 0, quizLast: 0,
        speedBest: 0, comboBest: 0, bossBest: 0, bossAttempts: 0,
        xp: 0, badges: {},
      });
      const [loaded, setLoaded] = useState(false);

      useEffect(() => {
        const p = safeGet('apgov:progress', { cases: {}, docs: {}, terms: {} });
        const s = safeGet('apgov:stats', {
          quizBest: 0, quizAttempts: 0, quizLast: 0,
          speedBest: 0, comboBest: 0, bossBest: 0, bossAttempts: 0,
          xp: 0, badges: {},
        });
        setProgress(p);
        setStats(s);
        setLoaded(true);
      }, []);

      const updateProgress = (kind, id, status) => {
        const next = { ...progress, [kind]: { ...progress[kind], [id]: status } };
        setProgress(next);
        safeSet('apgov:progress', next);
      };
      const updateStats = (patch, badgeKey) => {
        const newStats = { ...stats, ...patch };
        if (badgeKey) newStats.badges = { ...stats.badges, [badgeKey]: true };
        setStats(newStats);
        safeSet('apgov:stats', newStats);
      };

      };

    // =========================================================

    // =========================================================
    function Flashcards({ items, kind, progress, onUpdate, renderFront, renderBack }) {
      const [order, setOrder] = useState(() => items.map((_, i) => i));
      const [idx, setIdx] = useState(0);
      const [flipped, setFlipped] = useState(false);
      const [filter, setFilter] = useState('all');
      const visibleOrder = useMemo(() => {
        return order.filter(i => {
          const status = progress[items[i].id];
          if (filter === 'review') return status === 'review';
          if (filter === 'unseen') return !status;
          return true;
        });
      }, [order, progress, filter, items]);
      const safeIdx = Math.min(idx, Math.max(0, visibleOrder.length - 1));
      const current = visibleOrder.length > 0 ? items[visibleOrder[safeIdx]] : null;
      const next = () => { setFlipped(false); setTimeout(() => setIdx(i => (i + 1) % Math.max(visibleOrder.length, 1)), 100); };
      const prev = () => { setFlipped(false); setTimeout(() => setIdx(i => (i - 1 + visibleOrder.length) % Math.max(visibleOrder.length, 1)), 100); };
      const shuffle = () => { setOrder([...order].sort(() => Math.random() - 0.5)); setIdx(0); setFlipped(false); };
      const mark = (status) => { if (!current) return; onUpdate(current.id, status); next(); };
      const status = current ? progress[current.id] : null;
      return (
        <div>
          <div className="flex flex-wrap gap-3 items-center justify-between mb-5">
            <h2 className="text-2xl sm:text-3xl" style={{ fontFamily: "'Fraunces', serif", fontWeight: 800, color: COLORS.navy, letterSpacing: '-0.02em' }}>
              {kind === 'cases' ? 'Fifteen Cases.' : 'Nine Documents.'}
            </h2>
            <div className="flex gap-2 items-center text-xs" style={{ fontFamily: "'JetBrains Mono', monospace" }}>
              {['all', 'review', 'unseen'].map(f => (
                <button key={f} onClick={() => { setFilter(f); setIdx(0); }}
                  className="px-3 py-1.5 border uppercase tracking-wider"
                  style={{
                    borderColor: filter === f ? COLORS.navy : COLORS.navy + '40',
                    backgroundColor: filter === f ? COLORS.navy : 'transparent',
                    color: filter === f ? '#fff8e8' : COLORS.navy,
                  }}>{f}</button>
              ))}
              <button onClick={shuffle} className="p-2 border" style={{ borderColor: COLORS.navy + '40', color: COLORS.navy }}>
                <Shuffle size={14} />
              </button>
            </div>
          </div>
          {visibleOrder.length === 0 ? (
            <div className="border-2 border-dashed p-16 text-center" style={{ borderColor: COLORS.navy + '40' }}>
              <p style={{ fontFamily: "'Fraunces', serif", fontSize: '1.25rem', color: COLORS.navy }} className="italic">
                Nothing here — try a different filter.
              </p>
            </div>
          ) : (
            <>
              <div className="relative" style={{ perspective: '1600px' }}>
                <div onClick={() => setFlipped(f => !f)}
                  className="cursor-pointer min-h-[440px] transition-transform duration-500"
                  style={{ transformStyle: 'preserve-3d', transform: flipped ? 'rotateY(180deg)' : 'rotateY(0deg)' }}>
                  <div className="absolute inset-0 p-6 sm:p-9 border-2 flex flex-col"
                    style={{ backfaceVisibility: 'hidden', borderColor: COLORS.navy, backgroundColor: '#fdfaf0', boxShadow: '6px 6px 0 ' + COLORS.navy }}>
                    {renderFront(current)}
                    <div className="mt-auto pt-5 flex items-center justify-between text-xs" style={{ fontFamily: "'JetBrains Mono', monospace", color: COLORS.navy + 'aa' }}>
                      <span className="flex items-center gap-1.5"><Eye size={12} /> Tap to reveal</span>
                      <span>{safeIdx + 1} / {visibleOrder.length}</span>
                    </div>
                  </div>
                  <div className="absolute inset-0 p-6 sm:p-9 border-2 overflow-y-auto"
                    style={{ backfaceVisibility: 'hidden', transform: 'rotateY(180deg)', borderColor: COLORS.brick, backgroundColor: '#fff8e8', boxShadow: '6px 6px 0 ' + COLORS.brick }}>
                    {renderBack(current)}
                    <div className="mt-5 pt-3 border-t flex items-center justify-between text-xs" style={{ borderColor: COLORS.brick + '40', fontFamily: "'JetBrains Mono', monospace", color: COLORS.brick }}>
                      <span className="flex items-center gap-1.5"><EyeOff size={12} /> Tap to flip back</span>
                      <span>{safeIdx + 1} / {visibleOrder.length}</span>
                    </div>
                  </div>
                </div>
              </div>
              <div className="mt-5 flex flex-wrap gap-3 items-center justify-between">
                <div className="flex gap-2">
                  <button onClick={prev} className="p-3 border-2" style={{ borderColor: COLORS.navy, color: COLORS.navy }}>
                    <ChevronLeft size={18} />
                  </button>
                  <button onClick={next} className="p-3 border-2" style={{ borderColor: COLORS.navy, color: COLORS.navy }}>
                    <ChevronRight size={18} />
                  </button>
                </div>
                <div className="text-xs" style={{ fontFamily: "'JetBrains Mono', monospace" }}>
                  {status === 'mastered' && <span style={{ color: COLORS.brick }}>● Mastered</span>}
                  {status === 'review' && <span style={{ color: COLORS.gold }}>● Needs review</span>}
                  {!status && <span style={{ opacity: 0.6 }}>● Unseen</span>}
                </div>
                <div className="flex gap-2">
                  <button onClick={() => mark('review')}
                    className="flex items-center gap-2 px-4 py-3 border-2 text-sm"
                    style={{ borderColor: COLORS.gold, color: COLORS.navy, fontFamily: "'Fraunces', serif", fontWeight: 600 }}>
                    <RotateCcw size={15} /> Review again
                  </button>
                  <button onClick={() => mark('mastered')}
                    className="flex items-center gap-2 px-4 py-3 text-sm"
                    style={{ backgroundColor: COLORS.navy, color: '#fff8e8', fontFamily: "'Fraunces', serif", fontWeight: 600 }}>
                    <Check size={15} /> Got it
                  </button>
                </div>
              </div>
            </>
          )}
        </div>
      );
    }

    function SpeedRound({ stats, updateStats, addXP }) {
      const [phase, setPhase] = useState('intro');

      const [idx, setIdx] = useState(0);
      const [lives, setLives] = useState(3);

      const [timeLeft, setTimeLeft] = useState(15);
      const [selected, setSelected] = useState(null);
      const [feedback, setFeedback] = useState(null);
      const timerRef = useRef(null);
      const start = () => {
        setQuestions([...SPEED_QUESTIONS].sort(() => Math.random() - 0.5));
        setIdx(0); setLives(3); setScore(0); setCombo(0); setTopCombo(0);
        setTimeLeft(15); setSelected(null); setFeedback(null);
        setPhase('playing');
      };
      useEffect(() => {
        if (phase !== 'playing') return;
        if (timerRef.current) clearInterval(timerRef.current);
        timerRef.current = setInterval(() => {
          setTimeLeft(t => {
            if (t <= 0.1) return 0;
            return +(t - 0.1).toFixed(1);
          });
        }, 100);
        return () => clearInterval(timerRef.current);
      }, [phase, idx]);
      useEffect(() => {
        if (phase === 'playing' && timeLeft <= 0 && selected === null) {
          handleAnswer(-1);
        }
      }, [timeLeft]);
      const handleAnswer = (i) => {
        if (selected !== null || phase !== 'playing') return;
        const q = questions[idx];
        const isRight = i === q.correct;
        setSelected(i);
        setFeedback(isRight ? 'right' : 'wrong');
        if (isRight) {
          const newCombo = combo + 1;
          const mult = 1 + Math.floor(newCombo / 3) * 0.5;
          const points = Math.round(10 * mult * (timeLeft / 15 + 0.5));
          setCombo(newCombo);
          setTopCombo(c => Math.max(c, newCombo));
          setScore(s => s + points);
        } else {
          setCombo(0);
          setLives(l => l - 1);
        }
        setTimeout(() => {
          const newLives = isRight ? lives : lives - 1;
          const isLastQ = idx + 1 >= questions.length;
          if (newLives <= 0 || isLastQ) {
            finish(isRight ? score + Math.round(10 * (1 + Math.floor((combo + 1) / 3) * 0.5) * (timeLeft / 15 + 0.5)) : score, Math.max(topCombo, isRight ? combo + 1 : combo));
          } else {
            setIdx(i => i + 1);
            setSelected(null);
            setFeedback(null);
            setTimeLeft(15);
          }
        }, 800);
      };
      const finish = (finalScore, finalCombo) => {
        setPhase('over');
        const patch = {};
        if (finalScore > (stats.speedBest || 0)) patch.speedBest = finalScore;
        if (finalCombo > (stats.comboBest || 0)) patch.comboBest = finalCombo;
        let badge = null;
        if (!stats.badges?.firstSpeed) badge = 'firstSpeed';
        else if (finalCombo >= 10 && !stats.badges?.combo10) badge = 'combo10';
        else if (lives === 3 && finalScore > 0 && !stats.badges?.perfectSpeed) badge = 'perfectSpeed';
        updateStats(patch, badge);
        addXP(Math.floor(finalScore / 10));
      };
      if (phase === 'intro') {
        return (
          <div className="text-center py-12">
            <Zap size={56} className="mx-auto mb-3" style={{ color: COLORS.brick }} />
            <h2 className="text-4xl sm:text-5xl" style={{ fontFamily: "'Fraunces', serif", fontWeight: 800, color: COLORS.navy, letterSpacing: '-0.03em' }}>

            <p className="mt-3 max-w-md mx-auto" style={{ fontFamily: "'Fraunces', serif", fontSize: '1.05rem' }}>
              25 quick questions. <strong>15 seconds each.</strong> 3 lives. Build combos for score multipliers.
            </p>
            <div className="mt-6 grid grid-cols-3 gap-3 max-w-md mx-auto text-xs" style={{ fontFamily: "'JetBrains Mono', monospace" }}>

              </div>
              <div className="border p-3" style={{ borderColor: COLORS.navy + '40' }}>
                <div className="opacity-60">Top Combo</div>

              </div>

            </div>
            <button onClick={start}

                const d = DOCS.find(x => x.id === id);
                return (
                  <span key={id} className="text-[10px] px-2 py-0.5 border" style={{ borderColor: COLORS.gold, color: COLORS.navy, fontFamily: "'JetBrains Mono', monospace" }}>
                    {d?.name || id}
                  </span>
                );
              })}
            </div>
          </div>
          <textarea value={text} onChange={(e) => setText(e.target.value)} disabled={submitted}
            placeholder="Begin your argument here. Aim for at least 4 paragraphs: thesis, evidence (1), evidence (2), refutation/concession."
            className="w-full p-4 border-2 outline-none resize-y min-h-[280px]"
            style={{ borderColor: submitted ? COLORS.navy + '40' : COLORS.navy, backgroundColor: '#fff8e8', fontFamily: "'Fraunces', serif", fontSize: '1rem', lineHeight: 1.6, color: COLORS.navy }} />
          <div className="flex justify-between items-center mt-2 text-xs" style={{ fontFamily: "'JetBrains Mono', monospace" }}>
            <span className="opacity-60">{wordCount} words {wordCount < 200 && !submitted && '· aim for 300+'}</span>
            {!submitted ? (
              <button onClick={submit} disabled={wordCount < 50}
                className="px-5 py-2.5 disabled:opacity-40"
                style={{ backgroundColor: COLORS.brick, color: '#fff8e8', fontFamily: "'Fraunces', serif", fontWeight: 600 }}>
                Submit for self-grading
              </button>
            ) : (
              <span style={{ color: COLORS.brick, fontWeight: 700 }}>Submitted ·  Grade yourself below</span>
            )}
          </div>
          {showRubric && (
            <div className="mt-6 border-2 p-5" style={{ borderColor: COLORS.gold, backgroundColor: '#fff8e8' }}>
              <div className="flex justify-between items-baseline mb-4">
                <div>
                  <div className="text-[10px] uppercase tracking-[0.2em]" style={{ color: COLORS.brick, fontFamily: "'JetBrains Mono', monospace" }}>Self-Grade Rubric</div>
                  <div className="text-xl mt-0.5" style={{ fontFamily: "'Fraunces', serif", fontWeight: 700, color: COLORS.navy }}>
                    Be honest. The exam graders will be.
                  </div>
                </div>
                <div className="text-3xl" style={{ fontFamily: "'Fraunces', serif", fontWeight: 800, color: COLORS.brick }}>
                  {totalPoints}<span className="text-base opacity-50">/{maxPoints}</span>
                </div>
              </div>
              <div className="space-y-2.5">
                {prompt.rubric.map(r => {
                  const v = scored[r.id];
                  return (
                    <div key={r.id} className="flex items-start gap-3 p-3 border" style={{ borderColor: v === true ? COLORS.navy : v === false ? COLORS.brick : COLORS.navy + '30', backgroundColor: '#fdfaf0' }}>
                      <p className="flex-1 text-sm leading-snug" style={{ fontFamily: "'Fraunces', serif" }}>{r.label}</p>
                      <div className="flex gap-1.5">
                        <button onClick={() => grade(r.id, true)}
                          className="p-1.5 border-2"
                          style={{ borderColor: v === true ? COLORS.navy : COLORS.navy + '40', backgroundColor: v === true ? COLORS.navy : 'transparent', color: v === true ? '#fff8e8' : COLORS.navy }}>
                          <Check size={14} />
                        </button>
                        <button onClick={() => grade(r.id, false)}
                          className="p-1.5 border-2"
                          style={{ borderColor: v === false ? COLORS.brick : COLORS.navy + '40', backgroundColor: v === false ? COLORS.brick : 'transparent', color: v === false ? '#fff8e8' : COLORS.navy }}>
                          <XIcon size={14} />
                        </button>
                      </div>
                    </div>
                  );
                })}
              </div>
              {Object.keys(scored).length === maxPoints && (
                <div className="mt-4 p-3 text-center" style={{ backgroundColor: COLORS.navy, color: '#fff8e8' }}>
                  <div className="text-xs" style={{ fontFamily: "'JetBrains Mono', monospace" }}>
                    +{totalPoints * 3} XP earned
                  </div>
                  <div className="text-base mt-1" style={{ fontFamily: "'Fraunces', serif" }}>
                    {totalPoints === maxPoints ? 'Perfect rubric. You wrote a solid argument.' :
                     totalPoints >= 4 ? 'Strong essay. Tighten the gaps and try a new prompt.' :
                     'Review the missing elements before the next attempt.'}
                  </div>
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    // =========================================================
    // FINAL EXAM (BOSS MODE)
    // =========================================================
    function BossMode({ stats, updateStats, addXP }) {
      const [phase, setPhase] = useState('intro');
      const [questions, setQuestions] = useState([]);
      const [idx, setIdx] = useState(0);
      const [answers, setAnswers] = useState([]);
      const [selected, setSelected] = useState(null);
      const [timeLeft, setTimeLeft] = useState(8 * 60);
      const timerRef = useRef(null);
      const buildExam = () => {
        const mcq = [...HARD_QUESTIONS].sort(() => Math.random() - 0.5).slice(0, 10).map(q => ({ kind: 'mcq', ...q }));
        const cmp = [...COMPARISONS].sort(() => Math.random() - 0.5).slice(0, 5).map(q => ({
          kind: 'cmp',
          q: q.scenario + '\n\nWhich required case is the closest precedent?',
          options: q.options.map(id => CASES.find(c => c.id === id).name),
          correctIds: q.options,
          correct: q.options.indexOf(q.correct),
          explain: q.explain,
        }));
        const apl = [...APPLICATIONS].sort(() => Math.random() - 0.5).slice(0, 5).map(q => ({
          kind: 'apl',
          q: q.scenario + '\n\n' + q.q,
          options: q.options,
          correct: q.correct,
          explain: q.explain,
        }));
        return [...mcq, ...cmp, ...apl].sort(() => Math.random() - 0.5);
      };
      const start = () => {
        setQuestions(buildExam());
        setIdx(0); setAnswers([]); setSelected(null); setTimeLeft(8 * 60);
        setPhase('playing');
      };
      useEffect(() => {
        if (phase !== 'playing') return;
        if (timerRef.current) clearInterval(timerRef.current);
        timerRef.current = setInterval(() => {
          setTimeLeft(t => {
            if (t <= 1) { finish(answers); return 0; }
            return t - 1;
          });
        }, 1000);
        return () => clearInterval(timerRef.current);
      }, [phase]);
      const submitAnswer = (i) => { if (selected !== null) return; setSelected(i); };
      const advance = () => {
        const q = questions[idx];
        const correct = selected === q.correct;
        const next = [...answers, { idx, picked: selected, correct, q }];
        setAnswers(next);
        if (idx + 1 >= questions.length) finish(next);
        else { setIdx(idx + 1); setSelected(null); }
      };
      const finish = (finalAnswers) => {
        if (timerRef.current) clearInterval(timerRef.current);
        const correct = finalAnswers.filter(a => a.correct).length;
        const score = Math.round(correct / questions.length * 100);
        const patch = { bossAttempts: (stats.bossAttempts || 0) + 1, bossLast: score };
        if (score > (stats.bossBest || 0)) patch.bossBest = score;
        let badge = null;
        if (score >= 70 && !stats.badges?.finalPass) badge = 'finalPass';
        else if (score >= 90 && !stats.badges?.finalAce) badge = 'finalAce';
        updateStats(patch, badge);
        addXP(score);
        setPhase('over');
      };
      if (phase === 'intro') {
        return (
          <div className="text-center py-12">
            <Crown size={56} className="mx-auto mb-3" style={{ color: COLORS.brick }} />
            <h2 className="text-4xl sm:text-6xl" style={{ fontFamily: "'Fraunces', serif", fontWeight: 900, color: COLORS.navy, letterSpacing: '-0.04em' }}>
              The Final Exam
            </h2>
            <p className="mt-3 max-w-md mx-auto" style={{ fontFamily: "'Fraunces', serif", fontSize: '1.05rem' }}>
              20 questions. 8-minute timer. Mixed format: hard MCQ, SCOTUS comparison, scenario application. <strong>No skipping.</strong>
            </p>
            <div className="mt-6 grid grid-cols-2 gap-3 max-w-sm mx-auto text-xs" style={{ fontFamily: "'JetBrains Mono', monospace" }}>
              <div className="border p-3" style={{ borderColor: COLORS.navy + '40' }}>
                <div className="opacity-60">Best Score</div>
                <div className="text-2xl mt-0.5" style={{ fontFamily: "'Fraunces', serif", fontWeight: 700, color: COLORS.brick }}>{stats.bossBest ? stats.bossBest + '%' : '—'}</div>
              </div>
              <div className="border p-3" style={{ borderColor: COLORS.navy + '40' }}>
                <div className="opacity-60">Attempts</div>
                <div className="text-2xl mt-0.5" style={{ fontFamily: "'Fraunces', serif", fontWeight: 700, color: COLORS.navy }}>{stats.bossAttempts || 0}</div>
              </div>
            </div>
            <button onClick={start}
              className="mt-8 px-7 py-3.5 inline-flex items-center gap-2 transition-transform hover:scale-105"
              style={{ backgroundColor: COLORS.brick, color: '#fff8e8', fontFamily: "'Fraunces', serif", fontWeight: 700, fontSize: '1.05rem' }}>
              <Crown size={18} /> Begin
            </button>
          </div>
        );
      }
      if (phase === 'over') {
        const correct = answers.filter(a => a.correct).length;
        const score = Math.round(correct / questions.length * 100);
        return (
          <div className="py-8">
            <div className="text-center mb-8">
              <div className="text-xs uppercase tracking-[0.25em]" style={{ color: COLORS.brick, fontFamily: "'JetBrains Mono', monospace" }}>
                Final Result
              </div>
              <div className="text-8xl sm:text-9xl mt-2" style={{ fontFamily: "'Fraunces', serif", fontWeight: 900, color: COLORS.navy, letterSpacing: '-0.05em' }}>
                {score}<span style={{ color: COLORS.brick }}>%</span>
              </div>
              <div className="mt-1 text-2xl italic" style={{ fontFamily: "'Fraunces', serif", color: COLORS.brick }}>
                {score >= 90 ? 'Constitutional scholar.' : score >= 75 ? 'Likely 4 or 5.' : score >= 60 ? 'Solid 3 territory.' : 'More study needed.'}
              </div>
              <div className="text-sm mt-1 opacity-70" style={{ fontFamily: "'JetBrains Mono', monospace" }}>
                {correct} / {questions.length} correct · +{score} XP
              </div>
              {score > (stats.bossBest || 0) && (
                <div className="mt-3 inline-block px-3 py-1.5 text-xs" style={{ backgroundColor: COLORS.gold, color: COLORS.navy, fontFamily: "'JetBrains Mono', monospace", fontWeight: 700 }}>
                  ★ NEW HIGH SCORE
                </div>
              )}
            </div>
            <div className="max-w-3xl mx-auto space-y-3">
              {answers.map((a, i) => (
                <div key={i} className="p-4 border-l-4 text-sm"
                  style={{ borderColor: a.correct ? COLORS.navy : COLORS.brick, backgroundColor: a.correct ? '#fdfaf0' : '#fff0ec' }}>
                  <div className="flex items-start gap-3">
                    <span className="text-xs mt-0.5" style={{ fontFamily: "'JetBrains Mono', monospace", color: a.correct ? COLORS.navy : COLORS.brick }}>
                      {a.correct ? '✓' : '✕'}
                    </span>
                    <div className="flex-1">
                      <div style={{ fontFamily: "'Fraunces', serif", fontWeight: 600, color: COLORS.navy, whiteSpace: 'pre-wrap' }}>{a.q.q}</div>
                      {!a.correct && (
                        <div className="mt-1.5 text-xs" style={{ fontFamily: "'Fraunces', serif" }}>
                          <span style={{ color: COLORS.brick }}>Correct: </span>
                          {a.q.options[a.q.correct]}
                        </div>
                      )}
                      <div className="mt-1.5 italic text-xs opacity-80" style={{ fontFamily: "'Fraunces', serif" }}>{a.q.explain}</div>
                    </div>
                  </div>
                </div>
              ))}
            </div>
            <div className="text-center mt-6">
              <button onClick={start}
                className="px-6 py-3 inline-flex items-center gap-2"
                style={{ backgroundColor: COLORS.navy, color: '#fff8e8', fontFamily: "'Fraunces', serif", fontWeight: 600 }}>
                <RotateCcw size={16} /> Retry
              </button>
            </div>
          </div>
        );
      }
      const q = questions[idx];
      const mins = Math.floor(timeLeft / 60);
      const secs = timeLeft % 60;
      const lowTime = timeLeft < 60;
      const correctSoFar = answers.filter(a => a.correct).length;
      return (
        <div className="max-w-3xl mx-auto pt-2">
          <div className="grid grid-cols-3 gap-2 mb-3 text-xs" style={{ fontFamily: "'JetBrains Mono', monospace" }}>
            <div className="border-2 p-2.5" style={{ borderColor: COLORS.navy }}>
              <div className="opacity-60 text-[10px] uppercase">Question</div>
              <div className="text-lg mt-0.5" style={{ fontFamily: "'Fraunces', serif", fontWeight: 700 }}>{idx + 1} / {questions.length}</div>
            </div>
            <div className="border-2 p-2.5" style={{ borderColor: lowTime ? COLORS.brick : COLORS.navy }}>
              <div className="opacity-60 text-[10px] uppercase">Time</div>
              <div className="text-lg mt-0.5" style={{ fontFamily: "'Fraunces', serif", fontWeight: 700, color: lowTime ? COLORS.brick : COLORS.navy }}>
                {mins}:{secs.toString().padStart(2, '0')}
              </div>
            </div>
            <div className="border-2 p-2.5" style={{ borderColor: COLORS.navy }}>
              <div className="opacity-60 text-[10px] uppercase">Correct</div>
              <div className="text-lg mt-0.5" style={{ fontFamily: "'Fraunces', serif", fontWeight: 700 }}>{correctSoFar}</div>
            </div>
          </div>
          <div className="h-1 mb-4" style={{ backgroundColor: COLORS.navy + '20' }}>
            <div className="h-full transition-all" style={{ width: ((idx) / questions.length * 100) + '%', backgroundColor: COLORS.brick }} />
          </div>
          <div className="border-2 p-5 sm:p-7" style={{ borderColor: COLORS.navy, backgroundColor: '#fdfaf0', boxShadow: '5px 5px 0 ' + COLORS.navy }}>
            <div className="text-[10px] uppercase tracking-[0.2em] mb-3" style={{ color: COLORS.brick, fontFamily: "'JetBrains Mono', monospace" }}>
              {q.kind === 'mcq' ? 'Multiple Choice' : q.kind === 'cmp' ? 'SCOTUS Comparison' : 'Scenario Application'}
            </div>
            <p className="text-base sm:text-lg leading-relaxed whitespace-pre-wrap" style={{ fontFamily: "'Fraunces', serif", fontWeight: 600, color: COLORS.navy }}>
              {q.q}
            </p>
            <div className="mt-5 space-y-2.5">
              {q.options.map((opt, i) => {
                let border = COLORS.navy + '40', bg = '#fff8e8', color = COLORS.navy;
                const isSelected = selected === i;
                const isCorrect = i === q.correct;
                if (selected !== null && isCorrect) { border = COLORS.navy; bg = '#d8e6c8'; }
                else if (selected !== null && isSelected && !isCorrect) { border = COLORS.brick; bg = '#fdd6d0'; color = COLORS.brick; }
                return (
                  <button key={i} onClick={() => submitAnswer(i)} disabled={selected !== null}
                    className="w-full text-left p-3.5 border-2 transition-all flex gap-3 items-start"
                    style={{ borderColor: border, backgroundColor: bg, color, cursor: selected !== null ? 'default' : 'pointer' }}>
                    <span className="text-xs mt-0.5 opacity-60" style={{ fontFamily: "'JetBrains Mono', monospace" }}>{String.fromCharCode(65 + i)}</span>
                    <span className="flex-1 text-sm" style={{ fontFamily: "'Fraunces', serif" }}>{opt}</span>
                    {selected !== null && isCorrect && <Check size={16} />}
                    {selected !== null && isSelected && !isCorrect && <XIcon size={16} />}
                  </button>
                );
              })}
            </div>
            {selected !== null && (
              <div className="mt-4 p-3 border-l-4" style={{ borderColor: COLORS.brick, backgroundColor: '#fff0ec55' }}>
                <p className="text-xs leading-relaxed" style={{ fontFamily: "'Fraunces', serif", color: COLORS.navy }}>{q.explain}</p>
              </div>
            )}
          </div>
          <div className="mt-4 flex justify-end">
            <button onClick={advance} disabled={selected === null}
              className="px-6 py-3 flex items-center gap-2 disabled:opacity-40"
              style={{ backgroundColor: COLORS.navy, color: '#fff8e8', fontFamily: "'Fraunces', serif", fontWeight: 600, cursor: selected === null ? 'not-allowed' : 'pointer' }}>
              {idx + 1 >= questions.length ? 'Finish' : 'Next'} <ArrowRight size={16} />
            </button>
          </div>
        </div>
      );
    }

    // =========================================================
    // RENDER
    // =========================================================
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
