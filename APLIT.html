function Icon({ name, size = 16, fill = "none", strokeWidth = 2, ...rest }) {
  const data = window.lucide && window.lucide.icons && window.lucide.icons[name];
  if (!data) return null;
  const children = data[2] || [];
  return (
    <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24"
         fill={fill} stroke="currentColor" strokeWidth={strokeWidth}
         strokeLinecap="round" strokeLinejoin="round" {...rest}>
      {children.map((child, i) => {
        const [tag, attrs] = child;
        const reactAttrs = {};
        for (const k in attrs) {
          const camel = k.replace(/-([a-z])/g, (_, c) => c.toUpperCase());
          reactAttrs[camel] = attrs[k];
        }
        return React.createElement(tag, { key: i, ...reactAttrs });
      })}
    </svg>
  );
}

// ========== STORAGE ==========
const safeGet = (key, fallback) => {
  try { const v = localStorage.getItem(key); if (v == null) return fallback; return JSON.parse(v); } catch { return fallback; }
};
const safeSet = (key, value) => { try { localStorage.setItem(key, JSON.stringify(value)); } catch {} };

const COLORS = { cream:'#f5efe1', forest:'#1f3a2e', oxblood:'#7c2415', gold:'#c89d4f', ink:'#1a1a1a' };

function App() {
  const [view, setView] = useState('home');
  const [studySub, setStudySub] = useState('works');
  const [drillSub, setDrillSub] = useState('speed');
  const [progress, setProgress] = useState({ works:{}, concepts:{}, devices:{} });
  const [stats, setStats] = useState({ speedBest:0, comboBest:0, bossBest:0, bossAttempts:0, xp:0, badges:{} });
  const [loaded, setLoaded] = useState(false);

  useEffect(() => {
    setProgress(safeGet('aplit:progress', { works:{}, concepts:{}, devices:{} }));
    setStats(safeGet('aplit:stats', { speedBest:0, comboBest:0, bossBest:0, bossAttempts:0, xp:0, badges:{} }));
    setLoaded(true);
  }, []);

  const updateProgress = (kind, id, status) => {
    const next = { ...progress, [kind]: { ...progress[kind], [id]: status } };
    setProgress(next); safeSet('aplit:progress', next);
  };
  const updateStats = (patch, badgeKey) => {
    const newStats = { ...stats, ...patch };
    if (badgeKey) newStats.badges = { ...stats.badges, [badgeKey]: true };
    setStats(newStats); safeSet('aplit:stats', newStats);
  };
  const addXP = (amt, badgeKey) => updateStats({ xp: (stats.xp || 0) + amt }, badgeKey);

  return (
    <div className="min-h-screen w-full"
      style={{ backgroundColor:COLORS.cream,
        backgroundImage:`radial-gradient(circle at 20% 10%, rgba(200,157,79,0.10), transparent 40%), radial-gradient(circle at 90% 90%, rgba(124,36,21,0.06), transparent 40%)`,
        fontFamily:"'Inter', system-ui, sans-serif", color:COLORS.forest }}>
      <Header view={view} setView={setView} stats={stats} />

function Flashcards({ items, kind, progress, onUpdate, renderFront, renderBack }) {
  const [order, setOrder] = useState(() => items.map((_, i) => i));
  const [idx, setIdx] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [filter, setFilter] = useState('all');
  const visibleOrder = useMemo(() => {
    return order.filter(i => {
      const status = progress[items[i].id];
      if (filter === 'review') return status === 'review';
      if (filter === 'unseen') return !status;
      return true;
    });
  }, [order, progress, filter, items]);
  const safeIdx = Math.min(idx, Math.max(0, visibleOrder.length - 1));
  const current = visibleOrder.length > 0 ? items[visibleOrder[safeIdx]] : null;
  const next = () => { setFlipped(false); setTimeout(() => setIdx(i => (i + 1) % Math.max(visibleOrder.length, 1)), 100); };
  const prev = () => { setFlipped(false); setTimeout(() => setIdx(i => (i - 1 + visibleOrder.length) % Math.max(visibleOrder.length, 1)), 100); };
  const shuffle = () => { setOrder([...order].sort(() => Math.random() - 0.5)); setIdx(0); setFlipped(false); };
  const mark = (status) => { if (!current) return; onUpdate(current.id, status); next(); };
  const status = current ? progress[current.id] : null;
  return (
    <div>
      <div className="flex flex-wrap gap-3 items-center justify-between mb-5">
        <h2 className="text-2xl sm:text-3xl" style={{ fontFamily:"'Fraunces', serif", fontWeight:800, color:COLORS.forest, letterSpacing:'-0.02em' }}>
          {kind === 'works' ? 'Major Works.' : 'Forms & Movements.'}
        </h2>
        <div className="flex gap-2 items-center text-xs" style={{ fontFamily:"'JetBrains Mono', monospace" }}>
          {['all', 'review', 'unseen'].map(f => (
            <button key={f} onClick={() => { setFilter(f); setIdx(0); }}
              className="px-3 py-1.5 border uppercase tracking-wider"
              style={{
                borderColor:filter === f ? COLORS.forest : COLORS.forest + '40',
                backgroundColor:filter === f ? COLORS.forest : 'transparent',
                color:filter === f ? '#fff8e8' : COLORS.forest,
              }}>{f}</button>
          ))}
          <button onClick={shuffle} className="p-2 border" style={{ borderColor:COLORS.forest + '40', color:COLORS.forest }}>
            <Shuffle size={14} />
          </button>
        </div>
      </div>
      {visibleOrder.length === 0 ? (
        <div className="border-2 border-dashed p-16 text-center" style={{ borderColor:COLORS.forest + '40' }}>
          <p style={{ fontFamily:"'Fraunces', serif", fontSize:'1.25rem', color:COLORS.forest }} className="italic">
            Nothing here — try a different filter.
          </p>
        </div>
      ) : (
        <>
          <div className="relative" style={{ perspective:'1600px' }}>
            <div onClick={() => setFlipped(f => !f)}
              className="cursor-pointer min-h-[460px] transition-transform duration-500"
              style={{ transformStyle:'preserve-3d', transform:flipped ? 'rotateY(180deg)' : 'rotateY(0deg)' }}>
              <div className="absolute inset-0 p-6 sm:p-9 border-2 flex flex-col"
                style={{ backfaceVisibility:'hidden', borderColor:COLORS.forest, backgroundColor:'#fdfaf0', boxShadow:'6px 6px 0 ' + COLORS.forest }}>
                {renderFront(current)}
                <div className="mt-auto pt-5 flex items-center justify-between text-xs" style={{ fontFamily:"'JetBrains Mono', monospace", color:COLORS.forest + 'aa' }}>
                  <span className="flex items-center gap-1.5"><Eye size={12} /> Tap to reveal</span>
                  <span>{safeIdx + 1} / {visibleOrder.length}</span>
                </div>
              </div>
              <div className="absolute inset-0 p-6 sm:p-9 border-2 overflow-y-auto"
                style={{ backfaceVisibility:'hidden', transform:'rotateY(180deg)', borderColor:COLORS.oxblood, backgroundColor:'#fff8e8', boxShadow:'6px 6px 0 ' + COLORS.oxblood }}>
                {renderBack(current)}
                <div className="mt-5 pt-3 border-t flex items-center justify-between text-xs" style={{ borderColor:COLORS.oxblood + '40', fontFamily:"'JetBrains Mono', monospace", color:COLORS.oxblood }}>
                  <span className="flex items-center gap-1.5"><EyeOff size={12} /> Tap to flip back</span>
                  <span>{safeIdx + 1} / {visibleOrder.length}</span>
                </div>
              </div>
            </div>
          </div>
          <div className="mt-5 flex flex-wrap gap-3 items-center justify-between">
            <div className="flex gap-2">
              <button onClick={prev} className="p-3 border-2" style={{ borderColor:COLORS.forest, color:COLORS.forest }}>
                <ChevronLeft size={18} />
              </button>
              <button onClick={next} className="p-3 border-2" style={{ borderColor:COLORS.forest, color:COLORS.forest }}>
                <ChevronRight size={18} />
              </button>
            </div>
            <div className="text-xs" style={{ fontFamily:"'JetBrains Mono', monospace" }}>
              {status === 'mastered' && <span style={{ color:COLORS.oxblood }}>● Mastered</span>}
              {status === 'review' && <span style={{ color:COLORS.gold }}>● Needs review</span>}
              {!status && <span style={{ opacity:0.6 }}>● Unseen</span>}
            </div>
            <div className="flex gap-2">
              <button onClick={() => mark('review')}
                className="flex items-center gap-2 px-4 py-3 border-2 text-sm"
                style={{ borderColor:COLORS.gold, color:COLORS.forest, fontFamily:"'Fraunces', serif", fontWeight:600 }}>
                <RotateCcw size={15} /> Review again
              </button>
              <button onClick={() => mark('mastered')}
                className="flex items-center gap-2 px-4 py-3 text-sm"
                style={{ backgroundColor:COLORS.forest, color:'#fff8e8', fontFamily:"'Fraunces', serif", fontWeight:600 }}>
                <Check size={15} /> Got it
              </button>
            </div>
          </div>
        </>
      )}
    </div>
  );
}

function SpeedRound({ stats, updateStats, addXP }) {
  const [phase, setPhase] = useState('intro');
  const [questions, setQuestions] = useState([]);
  const [idx, setIdx] = useState(0);
  const [lives, setLives] = useState(3);
  const [score, setScore] = useState(0);
  const [combo, setCombo] = useState(0);
  const [topCombo, setTopCombo] = useState(0);
  const [timeLeft, setTimeLeft] = useState(15);
  const [selected, setSelected] = useState(null);
  const [feedback, setFeedback] = useState(null);
  const timerRef = useRef(null);
  const start = () => {
    setQuestions([...SPEED_QUESTIONS].sort(() => Math.random() - 0.5));
    setIdx(0); setLives(3); setScore(0); setCombo(0); setTopCombo(0);
    setTimeLeft(15); setSelected(null); setFeedback(null);
    setPhase('playing');
  };
  useEffect(() => {
    if (phase !== 'playing') return;
    if (timerRef.current) clearInterval(timerRef.current);
    timerRef.current = setInterval(() => {
      setTimeLeft(t => { if (t <= 0.1) return 0; return +(t - 0.1).toFixed(1); });
    }, 100);
    return () => clearInterval(timerRef.current);
  }, [phase, idx]);
  useEffect(() => {
    if (phase === 'playing' && timeLeft <= 0 && selected === null) handleAnswer(-1);
  }, [timeLeft]);
  const handleAnswer = (i) => {
    if (selected !== null || phase !== 'playing') return;
    const q = questions[idx];
    const isRight = i === q.correct;
    setSelected(i);
    setFeedback(isRight ? 'right' : 'wrong');
    if (isRight) {
      const newCombo = combo + 1;
      const mult = 1 + Math.floor(newCombo / 3) * 0.5;
      const points = Math.round(10 * mult * (timeLeft / 15 + 0.5));
      setCombo(newCombo);
      setTopCombo(c => Math.max(c, newCombo));
      setScore(s => s + points);
    } else {
      setCombo(0);
      setLives(l => l - 1);
    }
    setTimeout(() => {
      const newLives = isRight ? lives : lives - 1;
      const isLastQ = idx + 1 >= questions.length;
      if (newLives <= 0 || isLastQ) {
        finish(isRight ? score + Math.round(10 * (1 + Math.floor((combo + 1) / 3) * 0.5) * (timeLeft / 15 + 0.5)) : score, Math.max(topCombo, isRight ? combo + 1 : combo));
      } else {
        setIdx(i => i + 1); setSelected(null); setFeedback(null); setTimeLeft(15);
      }
    }, 800);
  };
  const finish = (finalScore, finalCombo) => {
    setPhase('over');
    const patch = {};
    if (finalScore > (stats.speedBest || 0)) patch.speedBest = finalScore;
    if (finalCombo > (stats.comboBest || 0)) patch.comboBest = finalCombo;
    let badge = null;
    if (!stats.badges?.firstSpeed) badge = 'firstSpeed';
    else if (finalCombo >= 10 && !stats.badges?.combo10) badge = 'combo10';
    else if (lives === 3 && finalScore > 0 && !stats.badges?.perfectSpeed) badge = 'perfectSpeed';
    updateStats(patch, badge);
    addXP(Math.floor(finalScore / 10));
  };
  if (phase === 'intro') {
    return (
      <div className="text-center py-12">
        <Zap size={56} className="mx-auto mb-3" style={{ color:COLORS.oxblood }} />
        <h2 className="text-4xl sm:text-5xl" style={{ fontFamily:"'Fraunces', serif", fontWeight:800, color:COLORS.forest, letterSpacing:'-0.03em' }}>
          Speed Round
        </h2>
        <p className="mt-3 max-w-md mx-auto" style={{ fontFamily:"'Fraunces', serif", fontSize:'1.05rem' }}>
          25 quick questions. <strong>15 seconds each.</strong> 3 lives. Build combos.
        </p>
        <div className="mt-6 grid grid-cols-3 gap-3 max-w-md mx-auto text-xs" style={{ fontFamily:"'JetBrains Mono', monospace" }}>
          <div className="border p-3" style={{ borderColor:COLORS.forest + '40' }}>
            <div className="opacity-60">Best Score</div>
            <div className="text-xl mt-0.5" style={{ fontFamily:"'Fraunces', serif", fontWeight:700, color:COLORS.oxblood }}>{stats.speedBest || 0}</div>
          </div>
          <div className="border p-3" style={{ borderColor:COLORS.forest + '40' }}>
            <div className="opacity-60">Top Combo</div>
            <div className="text-xl mt-0.5" style={{ fontFamily:"'Fraunces', serif", fontWeight:700, color:COLORS.gold }}>{stats.comboBest || 0}x</div>
          </div>
          <div className="border p-3" style={{ borderColor:COLORS.forest + '40' }}>
            <div className="opacity-60">Mult/3</div>
            <div className="text-xl mt-0.5" style={{ fontFamily:"'Fraunces', serif", fontWeight:700, color:COLORS.forest }}>+0.5x</div>
          </div>
        </div>
        <button onClick={start}
          className="mt-8 px-7 py-3.5 inline-flex items-center gap-2 transition-transform hover:scale-105"
          style={{ backgroundColor:COLORS.oxblood, color:'#fff8e8', fontFamily:"'Fraunces', serif", fontWeight:700, fontSize:'1.05rem' }}>
          <Zap size={18} /> Start Round
        </button>
      </div>
    );
  }
  if (phase === 'over') {
    return (
      <div className="text-center py-12">
        <div className="text-xs uppercase tracking-[0.25em]" style={{ color:COLORS.oxblood, fontFamily:"'JetBrains Mono', monospace" }}>
          {lives <= 0 ? 'Eliminated' : 'Run Complete'}
        </div>
        {lives <= 0 && <Skull size={48} className="mx-auto mt-3" style={{ color:COLORS.oxblood }} />}
        <div className="text-7xl sm:text-8xl mt-4" style={{ fontFamily:"'Fraunces', serif", fontWeight:900, color:COLORS.forest, letterSpacing:'-0.04em' }}>
          {score}
        </div>
        <div className="mt-1 text-sm opacity-70" style={{ fontFamily:"'JetBrains Mono', monospace" }}>
          Top combo: {topCombo}x
        </div>
        {score > (stats.speedBest || 0) && (
          <div className="mt-3 inline-block px-3 py-1.5 text-xs" style={{ backgroundColor:COLORS.gold, color:COLORS.forest, fontFamily:"'JetBrains Mono', monospace", fontWeight:700 }}>
            ★ NEW HIGH SCORE
          </div>
        )}
        <div className="mt-2 text-sm" style={{ fontFamily:"'Fraunces', serif", color:COLORS.oxblood }}>
          +{Math.floor(score / 10)} XP
        </div>
        <button onClick={start}
          className="mt-8 px-6 py-3 inline-flex items-center gap-2"
          style={{ backgroundColor:COLORS.forest, color:'#fff8e8', fontFamily:"'Fraunces', serif", fontWeight:600 }}>
          <RotateCcw size={16} /> Play Again
        </button>
      </div>
    );
  }
  const q = questions[idx];
  const mult = 1 + Math.floor(combo / 3) * 0.5;
  const lowTime = timeLeft <= 5;
  return (
    <div className="max-w-2xl mx-auto">
      <div className="grid grid-cols-3 gap-2 mb-4 text-xs" style={{ fontFamily:"'JetBrains Mono', monospace" }}>
        <div className="border-2 p-2.5" style={{ borderColor:COLORS.forest }}>
          <div className="opacity-60 text-[10px] uppercase">Lives</div>
          <div className="flex gap-1 mt-1">
            {[0,1,2].map(i => <Heart key={i} size={16} fill={i < lives ? COLORS.oxblood : 'none'} style={{ color:COLORS.oxblood }} />)}
          </div>
        </div>
        <div className="border-2 p-2.5" style={{ borderColor:combo >= 3 ? COLORS.gold : COLORS.forest + '40' }}>
          <div className="opacity-60 text-[10px] uppercase">Combo</div>
          <div className="text-xl mt-0.5" style={{ fontFamily:"'Fraunces', serif", fontWeight:800, color:combo >= 3 ? COLORS.gold : COLORS.forest }}>
            {combo}x {combo >= 3 && <span className="text-[10px]" style={{ color:COLORS.oxblood }}>·{mult}x</span>}
          </div>
        </div>
        <div className="border-2 p-2.5" style={{ borderColor:COLORS.forest }}>
          <div className="opacity-60 text-[10px] uppercase">Score</div>
          <div className="text-xl mt-0.5" style={{ fontFamily:"'Fraunces', serif", fontWeight:800, color:COLORS.forest }}>{score}</div>
        </div>
      </div>
      <div className="h-2 mb-4 relative overflow-hidden" style={{ backgroundColor:COLORS.forest + '20' }}>
        <div className="h-full transition-all" style={{ width:(timeLeft / 15 * 100) + '%', backgroundColor:lowTime ? COLORS.oxblood : COLORS.gold }} />
      </div>
      <div className="border-2 p-6 sm:p-8 transition-all"
        style={{
          borderColor:feedback === 'right' ? COLORS.forest : feedback === 'wrong' ? COLORS.oxblood : COLORS.forest,
          backgroundColor:feedback === 'right' ? '#e8f0e0' : feedback === 'wrong' ? '#fff0ec' : '#fdfaf0',
          boxShadow:'5px 5px 0 ' + (feedback === 'wrong' ? COLORS.oxblood : COLORS.forest),
        }}>
        <div className="flex items-baseline justify-between text-xs mb-3" style={{ fontFamily:"'JetBrains Mono', monospace" }}>
          <span style={{ color:COLORS.oxblood }}>QUESTION {idx + 1} / {questions.length}</span>
          <span style={{ color:lowTime ? COLORS.oxblood : COLORS.forest + 'aa', fontWeight:700 }}>{timeLeft.toFixed(1)}s</span>
        </div>
        <p className="text-xl sm:text-2xl leading-snug" style={{ fontFamily:"'Fraunces', serif", fontWeight:600, color:COLORS.forest }}>
          {q.q}
        </p>
        <div className="mt-5 grid grid-cols-1 sm:grid-cols-2 gap-2.5">
          {q.options.map((opt, i) => {
            let bg = '#fff8e8', border = COLORS.forest + '40', color = COLORS.forest;
            const isSelected = selected === i;
            const isCorrect = i === q.correct;
            if (selected !== null && isCorrect) { border = COLORS.forest; bg = '#d8e6c8'; }
            else if (selected !== null && isSelected && !isCorrect) { border = COLORS.oxblood; bg = '#fdd6d0'; color = COLORS.oxblood; }
            return (
              <button key={i} onClick={() => handleAnswer(i)} disabled={selected !== null}
                className="text-left p-3 border-2 transition-all flex gap-3 items-start text-sm"
                style={{ borderColor:border, backgroundColor:bg, color, fontFamily:"'Fraunces', serif", cursor:selected !== null ? 'default' : 'pointer' }}>
                <span className="text-xs mt-0.5 opacity-60" style={{ fontFamily:"'JetBrains Mono', monospace" }}>{String.fromCharCode(65 + i)}</span>
                <span className="flex-1">{opt}</span>
                {selected !== null && isCorrect && <Check size={16} />}
                {selected !== null && isSelected && !isCorrect && <XIcon size={16} />}
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
}

            <p className="text-sm leading-relaxed" style={{ fontFamily:"'Fraunces', serif", color:COLORS.forest }}>{q.explain}</p>
          </div>
          <div className="mt-5 flex justify-end">
            <button onClick={advance}
              className="px-6 py-3 flex items-center gap-2"
              style={{ backgroundColor:COLORS.forest, color:'#fff8e8', fontFamily:"'Fraunces', serif", fontWeight:600 }}>
              {idx + 1 >= questions.length ? 'See Results' : 'Next'} <ArrowRight size={16} />
            </button>
          </div>
        </>
      )}
    </div>
  );
}

function FRQPractice({ addXP }) {
  const [promptIdx, setPromptIdx] = useState(0);
  const [text, setText] = useState('');
  const [submitted, setSubmitted] = useState(false);
  const [scored, setScored] = useState({});
  const [showRubric, setShowRubric] = useState(false);
  const prompt = FRQ_PROMPTS[promptIdx];
  const wordCount = text.trim().split(/\s+/).filter(Boolean).length;
  const totalPoints = Object.values(scored).filter(Boolean).length;
  const maxPoints = prompt.rubric.length;
  const submit = () => { setSubmitted(true); setShowRubric(true); window.scrollTo({ top:0, behavior:'smooth' }); };
  const grade = (id, val) => {
    const next = { ...scored, [id]: val };
    setScored(next);
    if (Object.keys(next).length === maxPoints) addXP(Object.values(next).filter(Boolean).length * 3);
  };
  const reset = () => {
    setPromptIdx((promptIdx + 1) % FRQ_PROMPTS.length);
    setText(''); setSubmitted(false); setScored({}); setShowRubric(false);
  };
  return (
    <div className="max-w-3xl mx-auto">
      <div className="flex justify-between items-baseline mb-4">
        <div>
          <div className="text-xs uppercase tracking-[0.25em]" style={{ color:COLORS.oxblood, fontFamily:"'JetBrains Mono', monospace" }}>
            FRQ Practice
          </div>
          <h2 className="text-2xl sm:text-3xl mt-1" style={{ fontFamily:"'Fraunces', serif", fontWeight:800, color:COLORS.forest, letterSpacing:'-0.02em' }}>
            {prompt.title}
          </h2>
        </div>
        <button onClick={reset} className="text-xs px-3 py-1.5 border" style={{ borderColor:COLORS.forest + '40', fontFamily:"'JetBrains Mono', monospace", color:COLORS.forest }}>
          Next Prompt
        </button>
      </div>
      <div className="border-2 p-5 mb-4" style={{ borderColor:COLORS.forest, backgroundColor:'#fdfaf0' }}>
        <div className="text-[10px] uppercase tracking-[0.2em] mb-2" style={{ color:COLORS.oxblood, fontFamily:"'JetBrains Mono', monospace" }}>Prompt</div>
        <p className="text-base leading-relaxed mb-3" style={{ fontFamily:"'Fraunces', serif", color:COLORS.forest, fontWeight:600 }}>
          {prompt.prompt}
        </p>
        {prompt.passage && (
          <div className="border-l-4 pl-4 my-4 whitespace-pre-wrap" style={{ borderColor:COLORS.gold, fontFamily:"'Fraunces', serif", fontSize:'0.95rem', color:COLORS.forest, lineHeight:1.6 }}>
            {prompt.passage}
          </div>
        )}
        <p className="text-sm mt-3 italic opacity-80" style={{ fontFamily:"'Fraunces', serif" }}>
          {prompt.instructions}
        </p>
      </div>
      <textarea value={text} onChange={(e) => setText(e.target.value)} disabled={submitted}
        placeholder="Begin your essay here. Strong responses: clear thesis, specific evidence, analysis (HOW techniques produce meaning), engagement with complexity."
        className="w-full p-4 border-2 outline-none resize-y min-h-[280px]"
        style={{ borderColor:submitted ? COLORS.forest + '40' : COLORS.forest, backgroundColor:'#fff8e8', fontFamily:"'Fraunces', serif", fontSize:'1rem', lineHeight:1.6, color:COLORS.forest }} />
      <div className="flex justify-between items-center mt-2 text-xs" style={{ fontFamily:"'JetBrains Mono', monospace" }}>
        <span className="opacity-60">{wordCount} words {wordCount < 250 && !submitted && '· aim for 400+'}</span>
        {!submitted ? (
          <button onClick={submit} disabled={wordCount < 50}
            className="px-5 py-2.5 disabled:opacity-40"
            style={{ backgroundColor:COLORS.oxblood, color:'#fff8e8', fontFamily:"'Fraunces', serif", fontWeight:600 }}>
            Submit for self-grading
          </button>
        ) : (
          <span style={{ color:COLORS.oxblood, fontWeight:700 }}>Submitted · Grade yourself below</span>
        )}
      </div>
      {showRubric && (
        <div className="mt-6 border-2 p-5" style={{ borderColor:COLORS.gold, backgroundColor:'#fff8e8' }}>
          <div className="flex justify-between items-baseline mb-4">
            <div>
              <div className="text-[10px] uppercase tracking-[0.2em]" style={{ color:COLORS.oxblood, fontFamily:"'JetBrains Mono', monospace" }}>Self-Grade Rubric</div>
              <div className="text-xl mt-0.5" style={{ fontFamily:"'Fraunces', serif", fontWeight:700, color:COLORS.forest }}>
                Be honest with yourself.
              </div>
            </div>
            <div className="text-3xl" style={{ fontFamily:"'Fraunces', serif", fontWeight:800, color:COLORS.oxblood }}>
              {totalPoints}<span className="text-base opacity-50">/{maxPoints}</span>
            </div>
          </div>
          <div className="space-y-2.5">
            {prompt.rubric.map(r => {
              const v = scored[r.id];
              return (
                <div key={r.id} className="flex items-start gap-3 p-3 border" style={{ borderColor:v === true ? COLORS.forest : v === false ? COLORS.oxblood : COLORS.forest + '30', backgroundColor:'#fdfaf0' }}>
                  <p className="flex-1 text-sm leading-snug" style={{ fontFamily:"'Fraunces', serif" }}>{r.label}</p>
                  <div className="flex gap-1.5">
                    <button onClick={() => grade(r.id, true)}
                      className="p-1.5 border-2"
                      style={{ borderColor:v === true ? COLORS.forest : COLORS.forest + '40', backgroundColor:v === true ? COLORS.forest : 'transparent', color:v === true ? '#fff8e8' : COLORS.forest }}>
                      <Check size={14} />
                    </button>
                    <button onClick={() => grade(r.id, false)}
                      className="p-1.5 border-2"
                      style={{ borderColor:v === false ? COLORS.oxblood : COLORS.forest + '40', backgroundColor:v === false ? COLORS.oxblood : 'transparent', color:v === false ? '#fff8e8' : COLORS.forest }}>
                      <XIcon size={14} />
                    </button>
                  </div>
                </div>
              );
            })}
          </div>
          {Object.keys(scored).length === maxPoints && (
            <div className="mt-4 p-3 text-center" style={{ backgroundColor:COLORS.forest, color:'#fff8e8' }}>
              <div className="text-xs" style={{ fontFamily:"'JetBrains Mono', monospace" }}>
                +{totalPoints * 3} XP earned
              </div>
              <div className="text-base mt-1" style={{ fontFamily:"'Fraunces', serif" }}>
                {totalPoints === maxPoints ? 'Perfect rubric — you wrote a strong response.' :
                 totalPoints >= 4 ? 'Solid essay. Tighten the gaps next time.' :
                 'Review the missing elements and try another prompt.'}
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function BossMode({ stats, updateStats, addXP }) {
  const [phase, setPhase] = useState('intro');
  const [questions, setQuestions] = useState([]);
  const [idx, setIdx] = useState(0);
  const [answers, setAnswers] = useState([]);
  const [selected, setSelected] = useState(null);
  const [timeLeft, setTimeLeft] = useState(8 * 60);
  const timerRef = useRef(null);
  const buildExam = () => {
    const mcq = [...HARD_QUESTIONS].sort(() => Math.random() - 0.5).slice(0, 10).map(q => ({ kind:'mcq', ...q }));
    const ident = [...COMPARISONS].sort(() => Math.random() - 0.5).slice(0, 5).map(q => ({
      kind:'ident',
      passage:q.snippet,
      q:'Which device is at work?',
      options:q.options,
      correct:q.options.indexOf(q.correct),
      explain:q.explain,
    }));
    const cr = [...APPLICATIONS].sort(() => Math.random() - 0.5).slice(0, 5).map(q => ({
      kind:'cr', passage:q.passage, q:q.q, options:q.options, correct:q.correct, explain:q.explain,
    }));
    return [...mcq, ...ident, ...cr].sort(() => Math.random() - 0.5);
  };
  const start = () => {
    setQuestions(buildExam());
    setIdx(0); setAnswers([]); setSelected(null); setTimeLeft(8 * 60);
    setPhase('playing');
  };
  useEffect(() => {
    if (phase !== 'playing') return;
    if (timerRef.current) clearInterval(timerRef.current);
    timerRef.current = setInterval(() => {
      setTimeLeft(t => { if (t <= 1) { finish(answers); return 0; } return t - 1; });
    }, 1000);
    return () => clearInterval(timerRef.current);
  }, [phase]);
  const submitAnswer = (i) => { if (selected !== null) return; setSelected(i); };
  const advance = () => {
    const q = questions[idx];
    const correct = selected === q.correct;
    const next = [...answers, { idx, picked:selected, correct, q }];
    setAnswers(next);
    if (idx + 1 >= questions.length) finish(next);
    else { setIdx(idx + 1); setSelected(null); }
  };
  const finish = (finalAnswers) => {
    if (timerRef.current) clearInterval(timerRef.current);
    const correct = finalAnswers.filter(a => a.correct).length;
    const score = Math.round(correct / questions.length * 100);
    const patch = { bossAttempts: (stats.bossAttempts || 0) + 1, bossLast: score };
    if (score > (stats.bossBest || 0)) patch.bossBest = score;
    let badge = null;
    if (score >= 70 && !stats.badges?.finalPass) badge = 'finalPass';
    else if (score >= 90 && !stats.badges?.finalAce) badge = 'finalAce';
    updateStats(patch, badge);
    addXP(score);
    setPhase('over');
  };
  if (phase === 'intro') {
    return (
      <div className="text-center py-12">
        <Crown size={56} className="mx-auto mb-3" style={{ color:COLORS.oxblood }} />
        <h2 className="text-4xl sm:text-6xl" style={{ fontFamily:"'Fraunces', serif", fontWeight:900, color:COLORS.forest, letterSpacing:'-0.04em' }}>
          The Final Exam
        </h2>
        <p className="mt-3 max-w-md mx-auto" style={{ fontFamily:"'Fraunces', serif", fontSize:'1.05rem' }}>
          20 questions. 8-minute timer. Mixed format: passage MCQ, device identification, close reading. <strong>No skipping.</strong>
        </p>
        <div className="mt-6 grid grid-cols-2 gap-3 max-w-sm mx-auto text-xs" style={{ fontFamily:"'JetBrains Mono', monospace" }}>
          <div className="border p-3" style={{ borderColor:COLORS.forest + '40' }}>
            <div className="opacity-60">Best Score</div>
            <div className="text-2xl mt-0.5" style={{ fontFamily:"'Fraunces', serif", fontWeight:700, color:COLORS.oxblood }}>{stats.bossBest ? stats.bossBest + '%' : '—'}</div>
          </div>
          <div className="border p-3" style={{ borderColor:COLORS.forest + '40' }}>
            <div className="opacity-60">Attempts</div>
            <div className="text-2xl mt-0.5" style={{ fontFamily:"'Fraunces', serif", fontWeight:700, color:COLORS.forest }}>{stats.bossAttempts || 0}</div>
          </div>
        </div>
        <button onClick={start}
          className="mt-8 px-7 py-3.5 inline-flex items-center gap-2 transition-transform hover:scale-105"
          style={{ backgroundColor:COLORS.oxblood, color:'#fff8e8', fontFamily:"'Fraunces', serif", fontWeight:700, fontSize:'1.05rem' }}>
          <Crown size={18} /> Begin
        </button>
      </div>
    );
  }
  if (phase === 'over') {
    const correct = answers.filter(a => a.correct).length;
    const score = Math.round(correct / questions.length * 100);
    return (
      <div className="py-8">
        <div className="text-center mb-8">
          <div className="text-xs uppercase tracking-[0.25em]" style={{ color:COLORS.oxblood, fontFamily:"'JetBrains Mono', monospace" }}>
            Final Result
          </div>
          <div className="text-8xl sm:text-9xl mt-2" style={{ fontFamily:"'Fraunces', serif", fontWeight:900, color:COLORS.forest, letterSpacing:'-0.05em' }}>
            {score}<span style={{ color:COLORS.oxblood }}>%</span>
          </div>
          <div className="mt-1 text-2xl italic" style={{ fontFamily:"'Fraunces', serif", color:COLORS.oxblood }}>
            {score >= 90 ? 'Master of letters.' : score >= 75 ? 'Likely 4 or 5.' : score >= 60 ? 'Solid 3 territory.' : 'More reading needed.'}
          </div>
          <div className="text-sm mt-1 opacity-70" style={{ fontFamily:"'JetBrains Mono', monospace" }}>
            {correct} / {questions.length} correct · +{score} XP
          </div>
          {score > (stats.bossBest || 0) && (
            <div className="mt-3 inline-block px-3 py-1.5 text-xs" style={{ backgroundColor:COLORS.gold, color:COLORS.forest, fontFamily:"'JetBrains Mono', monospace", fontWeight:700 }}>
              ★ NEW HIGH SCORE
            </div>
          )}
        </div>
        <div className="max-w-3xl mx-auto space-y-3">
          {answers.map((a, i) => (
            <div key={i} className="p-4 border-l-4 text-sm"
              style={{ borderColor:a.correct ? COLORS.forest : COLORS.oxblood, backgroundColor:a.correct ? '#fdfaf0' : '#fff0ec' }}>
              <div className="flex items-start gap-3">
                <span className="text-xs mt-0.5" style={{ fontFamily:"'JetBrains Mono', monospace", color:a.correct ? COLORS.forest : COLORS.oxblood }}>
                  {a.correct ? '✓' : '✕'}
                </span>
                <div className="flex-1">
                  {a.q.passage && (
                    <div className="italic text-xs mb-1.5 opacity-80" style={{ fontFamily:"'Fraunces', serif" }}>{a.q.passage}</div>
                  )}
                  <div style={{ fontFamily:"'Fraunces', serif", fontWeight:600, color:COLORS.forest, whiteSpace:'pre-wrap' }}>{a.q.q}</div>
                  {!a.correct && (
                    <div className="mt-1.5 text-xs" style={{ fontFamily:"'Fraunces', serif" }}>
                      <span style={{ color:COLORS.oxblood }}>Correct: </span>
                      {a.q.options[a.q.correct]}
                    </div>
                  )}
                  <div className="mt-1.5 italic text-xs opacity-80" style={{ fontFamily:"'Fraunces', serif" }}>{a.q.explain}</div>
                </div>
              </div>
            </div>
          ))}
        </div>
        <div className="text-center mt-6">
          <button onClick={start}
            className="px-6 py-3 inline-flex items-center gap-2"
            style={{ backgroundColor:COLORS.forest, color:'#fff8e8', fontFamily:"'Fraunces', serif", fontWeight:600 }}>
            <RotateCcw size={16} /> Retry
          </button>
        </div>
      </div>
    );
  }
  const q = questions[idx];
  const mins = Math.floor(timeLeft / 60);
  const secs = timeLeft % 60;
  const lowTime = timeLeft < 60;
  const correctSoFar = answers.filter(a => a.correct).length;
  return (
    <div className="max-w-3xl mx-auto pt-2">
      <div className="grid grid-cols-3 gap-2 mb-3 text-xs" style={{ fontFamily:"'JetBrains Mono', monospace" }}>
        <div className="border-2 p-2.5" style={{ borderColor:COLORS.forest }}>
          <div className="opacity-60 text-[10px] uppercase">Question</div>
          <div className="text-lg mt-0.5" style={{ fontFamily:"'Fraunces', serif", fontWeight:700 }}>{idx + 1} / {questions.length}</div>
        </div>
        <div className="border-2 p-2.5" style={{ borderColor:lowTime ? COLORS.oxblood : COLORS.forest }}>
          <div className="opacity-60 text-[10px] uppercase">Time</div>
          <div className="text-lg mt-0.5" style={{ fontFamily:"'Fraunces', serif", fontWeight:700, color:lowTime ? COLORS.oxblood : COLORS.forest }}>
            {mins}:{secs.toString().padStart(2, '0')}
          </div>
        </div>
        <div className="border-2 p-2.5" style={{ borderColor:COLORS.forest }}>
          <div className="opacity-60 text-[10px] uppercase">Correct</div>
          <div className="text-lg mt-0.5" style={{ fontFamily:"'Fraunces', serif", fontWeight:700 }}>{correctSoFar}</div>
        </div>
      </div>
      <div className="h-1 mb-4" style={{ backgroundColor:COLORS.forest + '20' }}>
        <div className="h-full transition-all" style={{ width:((idx) / questions.length * 100) + '%', backgroundColor:COLORS.oxblood }} />
      </div>
      <div className="border-2 p-5 sm:p-7" style={{ borderColor:COLORS.forest, backgroundColor:'#fdfaf0', boxShadow:'5px 5px 0 ' + COLORS.forest }}>
        <div className="text-[10px] uppercase tracking-[0.2em] mb-3" style={{ color:COLORS.oxblood, fontFamily:"'JetBrains Mono', monospace" }}>
          {q.kind === 'mcq' ? 'Passage MCQ' : q.kind === 'ident' ? 'Device Identification' : 'Close Reading'}
        </div>
        {q.passage && (
          <div className="border-l-4 pl-4 mb-4 italic" style={{ borderColor:COLORS.gold, fontFamily:"'Fraunces', serif", fontSize:'0.95rem', color:COLORS.forest, lineHeight:1.6 }}>
            {q.passage}
          </div>
        )}
        <p className="text-base sm:text-lg leading-relaxed whitespace-pre-wrap" style={{ fontFamily:"'Fraunces', serif", fontWeight:600, color:COLORS.forest }}>
          {q.q}
        </p>
        <div className="mt-5 space-y-2.5">
          {q.options.map((opt, i) => {
            let border = COLORS.forest + '40', bg = '#fff8e8', color = COLORS.forest;
            const isSelected = selected === i;
            const isCorrect = i === q.correct;
            if (selected !== null && isCorrect) { border = COLORS.forest; bg = '#d8e6c8'; }
            else if (selected !== null && isSelected && !isCorrect) { border = COLORS.oxblood; bg = '#fdd6d0'; color = COLORS.oxblood; }
            return (
              <button key={i} onClick={() => submitAnswer(i)} disabled={selected !== null}
                className="w-full text-left p-3.5 border-2 transition-all flex gap-3 items-start"
                style={{ borderColor:border, backgroundColor:bg, color, cursor:selected !== null ? 'default' : 'pointer' }}>
                <span className="text-xs mt-0.5 opacity-60" style={{ fontFamily:"'JetBrains Mono', monospace" }}>{String.fromCharCode(65 + i)}</span>
                <span className="flex-1 text-sm" style={{ fontFamily:"'Fraunces', serif" }}>{opt}</span>
                {selected !== null && isCorrect && <Check size={16} />}
                {selected !== null && isSelected && !isCorrect && <XIcon size={16} />}
              </button>
            );
          })}
        </div>
        {selected !== null && (
          <div className="mt-4 p-3 border-l-4" style={{ borderColor:COLORS.oxblood, backgroundColor:'#fff0ec55' }}>
            <p className="text-xs leading-relaxed" style={{ fontFamily:"'Fraunces', serif", color:COLORS.forest }}>{q.explain}</p>
          </div>
        )}
      </div>
      <div className="mt-4 flex justify-end">
        <button onClick={advance} disabled={selected === null}
          className="px-6 py-3 flex items-center gap-2 disabled:opacity-40"
          style={{ backgroundColor:COLORS.forest, color:'#fff8e8', fontFamily:"'Fraunces', serif", fontWeight:600, cursor:selected === null ? 'not-allowed' : 'pointer' }}>
          {idx + 1 >= questions.length ? 'Finish' : 'Next'} <ArrowRight size={16} />
        </button>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
